<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilbud – Mesterbud</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #f7f9fc; color: #0f1f3d; min-height: 100vh; }

  .topbar { background: #0f1f3d; padding: 16px 24px; display: flex; align-items: center; }
  .logo { font-size: 20px; font-weight: 800; color: #fff; }
  .logo span { color: #6fa3ff; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px 60px; }

  .card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(15,31,61,0.08); margin-bottom: 16px; }

  .card-head { background: #0f1f3d; padding: 26px 28px; }
  .card-head-inner { display: flex; align-items: center; gap: 14px; }
  .logo-img { width: 52px; height: 52px; border-radius: 8px; background: #fff; object-fit: contain; flex-shrink: 0; }
  .firm-name { font-size: 20px; font-weight: 800; color: #fff; }
  .quote-num { font-size: 12px; color: #8fa3c8; margin-top: 3px; }

  .card-body { padding: 26px 28px; }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #6b7a99; padding-bottom: 8px; border-bottom: 1px solid #dde3ef; margin-bottom: 14px; }

  .summary-box { background: #e8eef8; border-radius: 8px; padding: 13px 15px; font-size: 14px; color: #1a3260; line-height: 1.7; margin-bottom: 22px; }

  table.items { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
  table.items th { text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #6b7a99; padding: 7px 8px; background: #f7f9fc; }
  table.items th.r { text-align: right; }
  table.items td { padding: 10px 8px; border-bottom: 1px solid #dde3ef; font-size: 14px; }
  table.items td.r { text-align: right; font-weight: 600; }

  .totals { background: #f7f9fc; border: 1px solid #dde3ef; border-radius: 10px; padding: 14px 16px; margin-bottom: 22px; }
  .tot-row { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; color: #6b7a99; }
  .tot-row.grand { font-size: 19px; font-weight: 800; color: #0f1f3d; padding-top: 11px; border-top: 2px solid #dde3ef; margin-top: 8px; }
  .tot-row.grand span:first-child { color: #0f1f3d; }

  .terms { background: #e8eef8; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #6b7a99; line-height: 1.8; }
  .terms strong { color: #0f1f3d; }

  /* Accept form */
  .accept-card { background: #fff; border-radius: 16px; padding: 26px 28px; box-shadow: 0 1px 4px rgba(15,31,61,0.08); }
  .accept-title { font-size: 16px; font-weight: 700; color: #0f1f3d; margin-bottom: 6px; }
  .accept-sub { font-size: 13px; color: #6b7a99; margin-bottom: 18px; line-height: 1.6; }
  label.field-label { display: block; font-size: 11px; font-weight: 700; color: #6b7a99; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  input.field-input { width: 100%; padding: 11px 14px; border: 1.5px solid #dde3ef; border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s; margin-bottom: 14px; }
  input.field-input:focus { border-color: #3b6fd4; }

  .btn-accept { width: 100%; padding: 14px; background: #16a34a; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; margin-bottom: 10px; }
  .btn-accept:hover { background: #15803d; }
  .btn-accept:disabled { background: #6b7a99; cursor: not-allowed; }
  .btn-decline { width: 100%; padding: 12px; background: transparent; color: #b91c1c; border: 1.5px solid #fca5a5; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-decline:hover { background: #fef2f2; }

  /* Success / Declined states */
  .state-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; }
  .state-icon { font-size: 72px; margin-bottom: 20px; }
  .state-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .state-sub { font-size: 15px; margin-bottom: 28px; }
  .confirm-box { background: #fff; border-radius: 14px; padding: 22px 28px; max-width: 380px; width: 100%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: left; }
  .confirm-row { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; border-bottom: 1px solid #dde3ef; }
  .confirm-row:last-child { border-bottom: none; font-size: 18px; font-weight: 800; color: #0f1f3d; padding-top: 10px; }
  .confirm-row span:first-child { color: #6b7a99; }

  /* Error */
  .error-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; }
  .error-screen h2 { font-size: 22px; color: #991b1b; margin-bottom: 10px; }
  .error-screen p { font-size: 14px; color: #6b7a99; }

  /* Expired warning */
  .expired-banner { background: #fef9c3; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #854d0e; margin-bottom: 16px; }
</style>
</head>
<body>

<div id="root"></div>

<script>
  function nok(n) {
    return new Intl.NumberFormat("nb-NO", { style: "currency", currency: "NOK", maximumFractionDigits: 0 }).format(Number(n) || 0);
  }

  function getQuoteFromURL() {
    try {
      const params = new URLSearchParams(window.location.search);
      const data = params.get("data");
      if (!data) return null;
      return JSON.parse(decodeURIComponent(data));
    } catch (e) {
      return null;
    }
  }

  function isExpired(validDays, sentDate) {
    if (!sentDate || !validDays) return false;
    const sent = new Date(sentDate);
    const expires = new Date(sent.getTime() + validDays * 24 * 60 * 60 * 1000);
    return new Date() > expires;
  }

  function renderError() {
    document.getElementById("root").innerHTML = `
      <div class="error-screen">
        <div style="font-size:56px;margin-bottom:16px;">🔗</div>
        <h2>Tilbudet ble ikke funnet</h2>
        <p>Lenken er ugyldig eller utløpt. Ta kontakt med håndverkeren for å få et nytt tilbud.</p>
      </div>`;
  }

  function renderAccepted(q, name) {
    document.getElementById("root").innerHTML = `
      <div style="background:#f0fdf4;min-height:100vh;">
        <div class="topbar"><div class="logo">Tilbud<span>AI</span></div></div>
        <div class="state-screen" style="background:#f0fdf4;">
          <div class="state-icon">✅</div>
          <h2 class="state-title" style="color:#166534;">Tilbud akseptert!</h2>
          <p class="state-sub" style="color:#166534;">Signert av <strong>${name}</strong><br>
          <span style="font-size:13px;opacity:0.7;">${new Date().toLocaleString("nb-NO")}</span></p>
          <div class="confirm-box">
            <div class="confirm-row"><span>Tilbudsnummer</span><span><strong>${q.num}</strong></span></div>
            <div class="confirm-row"><span>Fra</span><span>${q.firm}</span></div>
            <div class="confirm-row"><span>Oppdrag</span><span style="max-width:180px;text-align:right;font-size:13px;">${q.summary.slice(0,60)}</span></div>
            <div class="confirm-row"><span>Totalt inkl. MVA</span><span>${nok(q.total)}</span></div>
          </div>
          <p style="font-size:13px;color:#6b7a99;margin-top:20px;max-width:320px;line-height:1.6;">
            ${q.firm} vil ta kontakt for å bekrefte oppstart. Ta vare på denne siden som kvittering.
          </p>
        </div>
      </div>`;
  }

  function renderDeclined(q) {
    document.getElementById("root").innerHTML = `
      <div style="background:#fef2f2;min-height:100vh;">
        <div class="topbar"><div class="logo">Tilbud<span>AI</span></div></div>
        <div class="state-screen" style="background:#fef2f2;">
          <div class="state-icon">❌</div>
          <h2 class="state-title" style="color:#991b1b;">Tilbud avslått</h2>
          <p class="state-sub" style="color:#b91c1c;">Du har takket nei til tilbud ${q.num} fra ${q.firm}.</p>
          <p style="font-size:13px;color:#6b7a99;max-width:300px;line-height:1.6;">
            Ta gjerne kontakt med ${q.firm} direkte dersom du ønsker å diskutere tilbudet.
          </p>
        </div>
      </div>`;
  }

  function renderQuote(q) {
    const expired = isExpired(q.validDays, q.sentAt);

    const rows = (q.lineItems || []).map(l => `
      <tr>
        <td>${l.desc}</td>
        <td>${l.qty} ${l.unit}</td>
        <td class="r">${nok(l.total)}</td>
      </tr>`).join("");

    const sub = (q.lineItems || []).reduce((a, l) => a + (Number(l.total) || 0), 0);
    const mva = q.mva || Math.round(sub * 0.25);
    const total = q.total || sub + mva;

    document.getElementById("root").innerHTML = `
      <div class="topbar"><div class="logo">Tilbud<span>AI</span></div></div>
      <div class="wrap">

        <!-- Quote card -->
        <div class="card">
          <div class="card-head">
            <div class="card-head-inner">
              ${q.logo ? `<img src="${q.logo}" class="logo-img" alt="logo">` : ""}
              <div>
                <div class="firm-name">${q.firm}</div>
                <div class="quote-num">Tilbudsnr: ${q.num} · Gyldig ${q.validDays} dager</div>
              </div>
            </div>
          </div>
          <div class="card-body">

            ${expired ? `<div class="expired-banner">⚠️ Dette tilbudet kan ha utløpt. Ta kontakt med ${q.firm} for å bekrefte om det fortsatt er gyldig.</div>` : ""}

            <div class="section-label">Til</div>
            <p style="font-size:15px;font-weight:600;color:#0f1f3d;margin-bottom:20px;">${q.cust}</p>

            <div class="section-label">Oppdrag</div>
            <div class="summary-box">${q.summary}</div>

            <div class="section-label">Prisdetaljer</div>
            <table class="items">
              <thead><tr>
                <th>Beskrivelse</th>
                <th>Ant.</th>
                <th class="r">Sum</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>

            <div class="totals">
              <div class="tot-row"><span>Subtotal eks. MVA</span><span>${nok(sub)}</span></div>
              <div class="tot-row"><span>MVA 25%</span><span>${nok(mva)}</span></div>
              <div class="tot-row grand"><span>Totalt inkl. MVA</span><span>${nok(total)}</span></div>
            </div>

            <div class="terms">
              <strong>Betaling:</strong> ${q.paymentTerms}<br>
              <strong>Garanti:</strong> ${q.warranty || "12 måneders garanti på utført arbeid"}
            </div>
          </div>
        </div>

        <!-- Accept form -->
        <div class="accept-card">
          <div class="accept-title">Signer og aksepter tilbud</div>
          <div class="accept-sub">
            Ved å akseptere bekrefter du at du har lest og godtar tilbudet fra <strong>${q.firm}</strong> på <strong>${nok(total)}</strong> inkl. MVA.
          </div>
          <label class="field-label">Ditt fulle navn</label>
          <input class="field-input" id="signerName" type="text" placeholder="Ola Nordmann" autocomplete="name">
          <button class="btn-accept" id="acceptBtn" onclick="handleAccept()" disabled>✅ Aksepter tilbud</button>
          <button class="btn-decline" onclick="handleDecline()">❌ Avslå tilbud</button>
        </div>

      </div>`;

    // Enable accept button only when name is filled
    const nameInput = document.getElementById("signerName");
    const acceptBtn = document.getElementById("acceptBtn");
    nameInput.addEventListener("input", () => {
      acceptBtn.disabled = !nameInput.value.trim();
    });

    // Store quote on window for handlers
    window.__quote = q;
    window.__total = total;
  }

  function handleAccept() {
    const name = document.getElementById("signerName").value.trim();
    if (!name) return;

    // Notify backend (fire-and-forget, non-blocking)
    fetch("/api/quote-response", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ num: window.__quote.num, firm: window.__quote.firm, cust: window.__quote.cust, status: "akseptert", signedBy: name, total: window.__total }),
    }).catch(() => {});

    renderAccepted(window.__quote, name);
  }

  function handleDecline() {
    fetch("/api/quote-response", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ num: window.__quote.num, firm: window.__quote.firm, cust: window.__quote.cust, status: "avslått", total: window.__total }),
    }).catch(() => {});

    renderDeclined(window.__quote);
  }

  // Init
  const quote = getQuoteFromURL();
  if (!quote || !quote.num) {
    renderError();
  } else {
    renderQuote(quote);
  }
</script>
</body>
</html>
